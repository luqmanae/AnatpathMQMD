/* ================================================================ *
 *  STATE & HELPERS                                                  *
 * ================================================================ */
const BLOOM = {
  Remember:"bg-emerald-100 text-emerald-800 border-emerald-200",
  Understand:"bg-teal-100 text-teal-800 border-teal-200",
  Apply:"bg-amber-100 text-amber-800 border-amber-200",
  Analyse:"bg-orange-100 text-orange-800 border-orange-200",
  Evaluate:"bg-rose-100 text-rose-800 border-rose-200"
};
const TYPE_LABEL = {MCQ:"Single best answer", EMQ:"Extended matching", ShortAnswer:"Short answer", ImageLabel:"Image labelling"};
const TYPE_CHIP = {
  MCQ:"bg-slate-100 text-slate-700 border-slate-200",
  EMQ:"bg-indigo-50 text-indigo-700 border-indigo-200",
  ShortAnswer:"bg-violet-50 text-violet-700 border-violet-200",
  ImageLabel:"bg-sky-50 text-sky-700 border-sky-200"
};

let state = {
  view: "home",
  config: { count: 15, bloomsFilter: "all", typeFilter: "all", timed: false },
  pool: [], idx: 0, responses: {}, reviewMode: false,
  // per-question
  qState: {}
};

function shuffle(a){ a=[...a]; for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];} return a; }
function esc(s){ return String(s).replace(/[&<>"']/g, c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c])); }
function norm(t){ return (t||"").toString().trim().toLowerCase().replace(/[.,;:!?()]/g,"").replace(/\s+/g," "); }

function getFilteredPool(){
  let p = QUESTIONS.slice();
  if(state.config.bloomsFilter !== "all") p = p.filter(q => q.bloomsLevel === state.config.bloomsFilter);
  if(state.config.typeFilter !== "all") p = p.filter(q => q.type === state.config.typeFilter);
  return p;
}

function startQuiz(){
  let pool = shuffle(getFilteredPool()).slice(0, state.config.count);
  state.pool = pool;
  state.idx = 0;
  state.responses = {};
  state.qState = {};
  state.reviewMode = false;
  state.view = "quiz";
  initQuestion();
  render();
}

function reviewIncorrect(){
  const wrongIds = Object.entries(state.responses).filter(([_,r]) => !r.correct).map(([id]) => id);
  state.pool = shuffle(QUESTIONS.filter(q => wrongIds.includes(q.id)));
  state.idx = 0; state.responses = {}; state.qState = {};
  state.reviewMode = true; state.view = "quiz";
  initQuestion(); render();
}

function initQuestion(){
  const q = state.pool[state.idx];
  if(!q) return;
  const s = { submitted: false, started: Date.now() };
  if(q.type === "MCQ"){
    s.shuffled = shuffle(q.options.map((text, originalIdx) => ({text, originalIdx})));
    s.userAnswer = null;
  } else if(q.type === "EMQ"){
    s.emqAnswers = {};
  } else if(q.type === "ShortAnswer"){
    s.shortAnswers = Array(q.blanks).fill("");
  } else if(q.type === "ImageLabel"){
    s.hotspotAnswers = {};
    s.activeHotspot = null;
  }
  state.qState = s;
}

function submitCurrent(){
  const q = state.pool[state.idx]; const s = state.qState;
  let correct = false, user = null, partial = null;
  if(q.type === "MCQ"){
    if(s.userAnswer === null) return;
    correct = s.userAnswer === q.correctAnswer;
    user = s.userAnswer;
  } else if(q.type === "EMQ"){
    if(q.emqStems.some((_,i) => s.emqAnswers[i] === undefined)) return;
    const cnt = q.emqStems.filter((st,i) => s.emqAnswers[i] === st.correctAnswer).length;
    correct = cnt === q.emqStems.length;
    partial = cnt;
    user = {...s.emqAnswers};
  } else if(q.type === "ShortAnswer"){
    if(s.shortAnswers.some(a => !a.trim())) return;
    const variants = q.acceptableVariants || q.correctAnswer.map(c => [c]);
    correct = variants.every((acc, i) => {
      const u = norm(s.shortAnswers[i]);
      return acc.some(v => { const nv = norm(v); return nv === u || nv.includes(u) || u.includes(nv); });
    });
    user = [...s.shortAnswers];
  } else if(q.type === "ImageLabel"){
    if(Object.keys(s.hotspotAnswers).length < q.hotspots.length) return;
    correct = q.hotspots.every(h => s.hotspotAnswers[h.id] === h.label);
    user = {...s.hotspotAnswers};
  }
  state.responses[q.id] = { correct, user, partial };
  s.submitted = true;
  render();
}

function nextQuestion(){
  if(state.idx + 1 >= state.pool.length){
    state.view = "results";
  } else {
    state.idx++;
    initQuestion();
  }
  render();
}

function prevQuestion(){
  if(state.idx > 0){
    state.idx--;
    initQuestion();
    // restore prior response if exists
    const q = state.pool[state.idx]; const r = state.responses[q.id];
    if(r){
      state.qState.submitted = true;
      if(q.type === "MCQ") state.qState.userAnswer = r.user;
      else if(q.type === "EMQ") state.qState.emqAnswers = {...r.user};
      else if(q.type === "ShortAnswer") state.qState.shortAnswers = [...r.user];
      else if(q.type === "ImageLabel") state.qState.hotspotAnswers = {...r.user};
    }
    render();
  }
}

/* ================================================================ *
 *  RENDER FUNCTIONS                                                 *
 * ================================================================ */

function render(){
  const root = document.getElementById("app");
  if(state.view === "home") root.innerHTML = renderHome();
  else if(state.view === "quiz") root.innerHTML = renderQuiz();
  else if(state.view === "results") root.innerHTML = renderResults();
  attachHandlers();
}

/* ---------- QUIZ ---------- */
function renderQuiz(){
  const q = state.pool[state.idx]; const s = state.qState;
  const progress = ((state.idx + 1) / state.pool.length) * 100;
  const bloomCls = BLOOM[q.bloomsLevel] || "";
  const typeCls = TYPE_CHIP[q.type] || "";

  let answerHTML = "";
  if(q.type === "MCQ") answerHTML = renderMCQ(q, s);
  else if(q.type === "EMQ") answerHTML = renderEMQ(q, s);
  else if(q.type === "ShortAnswer") answerHTML = renderShort(q, s);
  else if(q.type === "ImageLabel") answerHTML = renderImageLabel(q, s);

  const feedback = s.submitted ? renderFeedback(q, state.responses[q.id]) : "";

  return `
  <div class="min-h-screen bg-stone-50 fade-in">
    <header class="bg-white border-b border-stone-200 sticky top-0 z-10">
      <div class="max-w-3xl mx-auto px-5 py-3 flex items-center justify-between">
        <button id="homeBtn" class="text-stone-500 hover:text-stone-900 text-sm">⌂ Home</button>
        <div class="text-sm font-medium">Question ${state.idx + 1} of ${state.pool.length}</div>
        <div class="w-16 text-right text-xs text-stone-500">${state.reviewMode?"Review":""}</div>
      </div>
      <div class="h-1 bg-stone-100"><div class="h-full bg-rose-700 transition-all" style="width:${progress}%"></div></div>
    </header>

    <main class="max-w-3xl mx-auto px-5 sm:px-6 py-7">
      <div class="flex flex-wrap items-center gap-2 mb-5">
        <span class="text-xs px-2.5 py-1 rounded-full font-medium border ${bloomCls}">🧠 ${q.bloomsLevel}</span>
        <span class="text-xs px-2.5 py-1 rounded-full border ${typeCls}">${TYPE_LABEL[q.type]}</span>

}

function renderMCQ(q, s){
  return `<div class="space-y-2">
    ${s.shuffled.map((opt, i) => {
      const letter = String.fromCharCode(65 + i);
      const isSelected = s.userAnswer === opt.originalIdx;
      const isCorrect = opt.originalIdx === q.correctAnswer;
      let cls = "border-stone-200 bg-white hover:border-stone-400";
      if(s.submitted){
        if(isCorrect) cls = "border-emerald-500 bg-emerald-50";
        else if(isSelected) cls = "border-rose-500 bg-rose-50";
        else cls = "border-stone-200 bg-white opacity-60";
      } else if(isSelected){
        cls = "border-stone-900 bg-stone-50";
      }
      const mark = s.submitted ? (isCorrect ? `<span class="text-emerald-700 font-bold">✓</span>` : (isSelected ? `<span class="text-rose-700 font-bold">✗</span>` : "")) : "";
      return `<button data-mcq="${opt.originalIdx}" ${s.submitted?"disabled":""} class="w-full text-left p-4 rounded-xl border-2 transition-all flex items-start gap-3 ${cls}">
        <span class="font-mono text-sm font-semibold text-stone-500 mt-0.5">${letter}</span>
        <span class="flex-1 text-sm sm:text-base leading-relaxed">${esc(opt.text)}</span>
        ${mark}
      </button>`;
    }).join("")}
  </div>`;
}

function renderEMQ(q, s){
  return `<div class="space-y-5">
    <div class="bg-indigo-50/50 border border-indigo-200 rounded-xl p-4">
      <h4 class="text-xs font-semibold uppercase tracking-wider text-indigo-700 mb-2">Option list</h4>
      <div class="grid sm:grid-cols-2 gap-1.5 text-sm text-indigo-900">
        ${q.emqOptions.map(o => `<div>${esc(o)}</div>`).join("")}
      </div>
    </div>
    ${q.emqStems.map((st, idx) => {
      const userPick = s.emqAnswers[idx];
      const correct = st.correctAnswer;
      let borderCls = "border-stone-300";
      if(s.submitted) borderCls = userPick === correct ? "border-emerald-500" : "border-rose-500";
      const fb = s.submitted ? `<div class="mt-2 text-xs ${userPick === correct ? 'text-emerald-700' : 'text-rose-700'}">
        ${userPick === correct ? '✓' : '✗'} Correct: <strong>${esc(q.emqOptions[correct])}</strong>. ${esc(st.explanation)}
      </div>` : "";
      return `<div class="bg-white border border-stone-200 rounded-xl p-4">
        <p class="text-sm leading-relaxed mb-3"><span class="font-semibold text-stone-500">Stem ${idx+1}.</span> ${esc(st.vignette)}</p>
        <select data-emq="${idx}" ${s.submitted?"disabled":""} class="w-full border-2 rounded-lg px-3 py-2 text-sm bg-white ${borderCls}">
          <option value="">— select an option —</option>
          ${q.emqOptions.map((o,i) => `<option value="${i}" ${userPick===i?"selected":""}>${esc(o)}</option>`).join("")}
        </select>
        ${fb}
      </div>`;
    }).join("")}
  </div>`;
}

function renderShort(q, s){
  const inputs = Array.from({length: q.blanks}).map((_, i) => `
    <div>
      ${q.blanks > 1 ? `<label class="text-xs text-stone-500 mb-1 block">Answer ${i+1}</label>` : ""}
      <input data-short="${i}" type="text" value="${esc(s.shortAnswers[i] || "")}" ${s.submitted?"disabled":""} placeholder="Type your answer…"
        class="w-full border-2 rounded-lg px-4 py-3 font-mono text-sm bg-white ${s.submitted?'border-stone-300 bg-stone-50':'border-stone-300 focus:border-stone-900 focus:outline-none'}">
    </div>
  `).join("");
  const accepted = s.submitted ? `<div class="text-xs text-stone-600 bg-stone-100 rounded-lg p-3"><strong>Acceptable answer${q.blanks>1?'s':''}:</strong> ${esc(q.correctAnswer.join(" · "))}</div>` : "";
  return `<div class="space-y-3">${inputs}${accepted}</div>`;
}

function renderImageLabel(q, s){
  const diagram = q.imageType === "pancreas" ? renderPancreasSVG(s) : renderCTSVG(s);
  const hotspotPicks = q.hotspots.map(h => {
    const ans = s.hotspotAnswers[h.id];
    const isCorrect = ans === h.label;
    let cls = "border-stone-200 bg-white hover:border-stone-400";
    let mark = "";
    if(s.submitted){
      cls = isCorrect ? "border-emerald-500 bg-emerald-50" : "border-rose-500 bg-rose-50";
      mark = isCorrect ? `<span class="text-emerald-700 ml-auto">✓</span>` : `<span class="ml-auto text-xs text-rose-700">→ ${esc(h.label)}</span>`;
    } else if(s.activeHotspot === h.id){
      cls = "border-stone-900 bg-stone-50";
    }
    return `<div data-hotspot="${h.id}" class="p-3 rounded-lg border-2 cursor-pointer text-sm ${cls}">
      <div class="flex items-center gap-2">
        <span class="w-6 h-6 rounded-full bg-stone-700 text-white text-xs grid place-items-center font-bold">${h.id}</span>
        <span class="${ans?'':'text-stone-400 italic'}">${esc(ans || 'click to select')}</span>
        ${mark}
      </div>
    </div>`;
  }).join("");

  const allOpts = q.hotspots[0]?.options || [];
  const picker = (!s.submitted && s.activeHotspot !== null) ? `
    <div class="bg-stone-100 rounded-lg p-3">
      <p class="text-xs text-stone-600 mb-2">Assign hotspot <strong>#${s.activeHotspot}</strong> to:</p>
      <div class="flex flex-wrap gap-2">
        ${allOpts.map(o => `<button data-pick="${esc(o)}" class="text-xs px-3 py-1.5 bg-white border border-stone-300 rounded-full hover:border-stone-900">${esc(o)}</button>`).join("")}
      </div>
    </div>` : "";

  return `<div class="space-y-4">${diagram}<div class="grid sm:grid-cols-2 gap-3">${hotspotPicks}</div>${picker}</div>`;
}

function renderFeedback(q, r){
  if(!r) return "";
  const c = r.correct;
  const cls = c ? "border-emerald-300 bg-emerald-50" : "border-rose-300 bg-rose-50";
  const headCls = c ? "text-emerald-900" : "text-rose-900";
  const partial = (q.type === "EMQ" && r.partial !== null) ? ` <span class="font-normal text-sm">(${r.partial}/${q.emqStems.length} matched)</span>` : "";
  const cc = q.clinicalCorrelation ? `
    <div class="flex items-start gap-2 text-sm text-stone-700 mb-2 bg-white/60 rounded-lg p-3">
      <span class="text-amber-600">💡</span>
      <p><strong>Clinical correlation:</strong> ${esc(q.clinicalCorrelation)}</p>
    </div>` : "";
  return `<div class="mt-6 rounded-2xl border-2 p-5 ${cls} fade-in">
    <h4 class="font-semibold ${headCls} mb-3">${c ? "✓ Correct" : "✗ Not quite"}${partial}</h4>
    <p class="text-sm leading-relaxed mb-3">${esc(q.explanation)}</p>
    ${cc}
    <p class="text-xs text-stone-500 italic">${esc(q.sourceCitation)}</p>
  </div>`;
}

/* ---------- RESULTS ---------- */
function renderResults(){
  const total = state.pool.length;
  const correct = state.pool.filter(q => state.responses[q.id]?.correct).length;
  const pct = total > 0 ? Math.round((correct / total) * 100) : 0;

  // Bloom's
  const bloomGroups = {};
  state.pool.forEach(q => {
    if(!bloomGroups[q.bloomsLevel]) bloomGroups[q.bloomsLevel] = {correct:0, total:0};
    bloomGroups[q.bloomsLevel].total++;
    if(state.responses[q.id]?.correct) bloomGroups[q.bloomsLevel].correct++;
  });
  const topicGroups = {};
  state.pool.forEach(q => {
    if(!topicGroups[q.topic]) topicGroups[q.topic] = {correct:0, total:0};
    topicGroups[q.topic].total++;
    if(state.responses[q.id]?.correct) topicGroups[q.topic].correct++;
  });

  const incorrect = state.pool.filter(q => !state.responses[q.id]?.correct);

  const bloomBars = Object.entries(bloomGroups).map(([k,v]) => {
    const w = v.total > 0 ? (v.correct / v.total) * 100 : 0;
    return `<div class="flex items-center gap-3">
      <div class="text-sm w-24"><span class="px-2 py-0.5 rounded-full text-xs border ${BLOOM[k]}">${k}</span></div>
      <div class="flex-1 bg-stone-100 rounded-full h-3 overflow-hidden">
        <div class="h-full bg-emerald-600" style="width:${w}%"></div>
      </div>
      <div class="text-xs font-mono text-stone-600 w-12 text-right">${v.correct}/${v.total}</div>
    </div>`;
  }).join("");

  const topicBars = Object.entries(topicGroups).sort((a,b) => b[1].total - a[1].total).map(([k,v]) => {
    const w = v.total > 0 ? (v.correct / v.total) * 100 : 0;
    return `<div class="flex items-center gap-3">
      <div class="text-sm w-1/2 truncate">${esc(k)}</div>
      <div class="flex-1 bg-stone-100 rounded-full h-3 overflow-hidden">
        <div class="h-full bg-emerald-600" style="width:${w}%"></div>
      </div>
      <div class="text-xs font-mono text-stone-600 w-12 text-right">${v.correct}/${v.total}</div>
    </div>`;
  }).join("");

  const incorrectList = incorrect.length > 0 ? `
    <div class="bg-white rounded-2xl border border-stone-200 p-6 mb-6">
      <h3 class="text-xs uppercase tracking-widest font-semibold text-stone-500 mb-4">Questions to revisit (${incorrect.length})</h3>
      <div class="space-y-3">
        ${incorrect.map(q => `<div class="border-l-2 border-rose-400 pl-4 py-1">
          <p class="text-sm font-medium mb-1">${esc(q.stem.length > 140 ? q.stem.slice(0,140)+'…' : q.stem)}</p>
          <p class="text-xs text-stone-500">${esc(q.topic)} · ${esc(q.bloomsLevel)} · ${esc(q.sourceCitation)}</p>
        </div>`).join("")}
      </div>
      <button id="reviewBtn" class="mt-5 w-full bg-stone-900 hover:bg-black text-white py-3 rounded-lg font-medium">↻ Review missed questions</button>
    </div>` : `
    <div class="bg-emerald-50 border border-emerald-200 rounded-2xl p-6 text-center mb-6">
      <p class="text-emerald-900 font-medium">✓ All correct in this session — well done.</p>
    </div>`;

  return `
  <div class="min-h-screen bg-stone-50 fade-in">
    <div class="max-w-3xl mx-auto px-5 sm:px-6 py-10">
      <header class="mb-8 flex items-center justify-between">
        <h1 class="text-2xl font-serif font-semibold">${state.reviewMode ? "Review session — results" : "Session complete"}</h1>
        <button id="homeBtn" class="text-sm text-stone-600 hover:text-stone-900">⌂ Home</button>
      </header>

      <div class="bg-white rounded-2xl border border-stone-200 p-8 mb-6 text-center">
        <div class="text-5xl mb-2">🏆</div>
        <p class="text-5xl font-serif font-semibold mb-1">${correct}/${total}</p>
        <p class="text-stone-500">${pct}% correct</p>
      </div>

      <div class="bg-white rounded-2xl border border-stone-200 p-6 mb-6">
        <h3 class="text-xs uppercase tracking-widest font-semibold text-stone-500 mb-4">By Bloom's level</h3>
        <div class="space-y-2">${bloomBars}</div>
      </div>

      <div class="bg-white rounded-2xl border border-stone-200 p-6 mb-6">
        <h3 class="text-xs uppercase tracking-widest font-semibold text-stone-500 mb-4">By topic</h3>
        <div class="space-y-2">${topicBars}</div>
      </div>

      ${incorrectList}
    </div>
  </div>
  `;
}

/* ================================================================ *
 *  EVENT WIRING                                                     *
 * ================================================================ */
function attachHandlers(){
  // Home
  const cfgCount = document.getElementById("cfgCount");
  if(cfgCount){
    cfgCount.oninput = (e) => {
      state.config.count = parseInt(e.target.value);
      document.getElementById("cfgCountVal").textContent = state.config.count;
    };
  }
  const cfgBloom = document.getElementById("cfgBloom");
  if(cfgBloom) cfgBloom.onchange = (e) => { state.config.bloomsFilter = e.target.value; render(); };
  const cfgType = document.getElementById("cfgType");
  if(cfgType) cfgType.onchange = (e) => { state.config.typeFilter = e.target.value; render(); };
  const mU = document.getElementById("modeUntimed");
  if(mU) mU.onclick = () => { state.config.timed = false; render(); };
  const mT = document.getElementById("modeTimed");
  if(mT) mT.onclick = () => { state.config.timed = true; render(); };
  const startBtn = document.getElementById("startBtn");
  if(startBtn) startBtn.onclick = () => startQuiz();

  // Quiz nav
  const homeBtn = document.getElementById("homeBtn");
  if(homeBtn) homeBtn.onclick = () => { state.view = "home"; render(); };
  const submitBtn = document.getElementById("submitBtn");
  if(submitBtn) submitBtn.onclick = () => submitCurrent();
  const nextBtn = document.getElementById("nextBtn");
  if(nextBtn) nextBtn.onclick = () => nextQuestion();
  const prevBtn = document.getElementById("prevBtn");
  if(prevBtn) prevBtn.onclick = () => prevQuestion();
  const reviewBtn = document.getElementById("reviewBtn");
  if(reviewBtn) reviewBtn.onclick = () => reviewIncorrect();

  // MCQ
  document.querySelectorAll("[data-mcq]").forEach(btn => {
    btn.onclick = () => { state.qState.userAnswer = parseInt(btn.dataset.mcq); render(); };
  });
  // EMQ
  document.querySelectorAll("[data-emq]").forEach(sel => {
    sel.onchange = (e) => {
      const idx = parseInt(sel.dataset.emq);
      state.qState.emqAnswers[idx] = e.target.value === "" ? undefined : parseInt(e.target.value);
    };
  });
  // Short answer
  document.querySelectorAll("[data-short]").forEach(inp => {
    inp.oninput = (e) => {
      state.qState.shortAnswers[parseInt(inp.dataset.short)] = e.target.value;
    };
  });
  // Image label hotspots
  document.querySelectorAll("[data-hotspot]").forEach(el => {
    el.onclick = () => { if(!state.qState.submitted){ state.qState.activeHotspot = parseInt(el.dataset.hotspot); render(); } };
  });
  document.querySelectorAll("[data-svghotspot]").forEach(el => {
    el.onclick = () => { if(!state.qState.submitted){ state.qState.activeHotspot = parseInt(el.dataset.svghotspot); render(); } };
  });
  document.querySelectorAll("[data-pick]").forEach(btn => {
    btn.onclick = () => {
      if(state.qState.activeHotspot !== null){
        state.qState.hotspotAnswers[state.qState.activeHotspot] = btn.dataset.pick;
        state.qState.activeHotspot = null;
        render();
      }
    };
  });
}

// Boot
render();
</script>
